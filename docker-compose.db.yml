services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_hunter
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - .data/dump.sql:/docker-entrypoint-initdb.d/dump.sql
  api:
    build: ./api
    container_name: api
    environment:
      HOST: mysql
      PORT: "3306"
      USER: root
      PASSWORD: root
      DATABASE: digital_hunter

volumes:
  mysql_data:
